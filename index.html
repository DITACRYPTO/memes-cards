<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MEMES CARDS</title>

  <style>
    body{
      margin:0;
      background:#000;
      color:#d4af37;
      font-family:Arial, sans-serif;
      text-align:center;
      padding:40px 20px;
    }

    .date{
      font-size:20px;
      letter-spacing:8px;
      margin-bottom:40px;
    }

    .hero{
      width:100%;
      max-width:800px;
      display:block;
      margin:0 auto;
    }

    .quote{
      margin-top:45px;
      font-size:18px;
      line-height:1.6;
      max-width:900px;
      margin-left:auto;
      margin-right:auto;
      color:#d4af37;
    }

    .footer{
      margin-top:80px;
    }

    .meme-logo{
      width:55%;
      max-width:420px;
      display:block;
      margin:0 auto;
      filter:drop-shadow(0 0 12px rgba(212,175,55,0.35));
    }
  </style>
</head>

<body>

  <div class="date">
    26.06.26
  </div>

  <img
    src="4f6832f2-34e9-41e0-9749-61a8846384bf.png"
    class="hero"
    alt="Teaser"
  >

  <div class="quote">
    Some jokes become memes. Some memes become culture. Some culture becomes real.
  </div>

  <div class="footer">
    <img src="memeyou.png" class="meme-logo" alt="WE WILL MEME YOU">
  </div>

</body>
</html>
